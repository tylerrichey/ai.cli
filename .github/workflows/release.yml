name: Release

on:
  push:
    tags: ['v*']

permissions:
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - run: dotnet pack src/Ai.Cli/Ai.Cli.csproj -c Release -o ./out /p:Version=${GITHUB_REF_NAME#v}

      - run: dotnet nuget push ./out/*.nupkg --source "https://nuget.pkg.github.com/tylerrichey/index.json" --api-key ${{ secrets.GITHUB_TOKEN }}
